<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AqboHub — Licey Akbobok</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ===== CSS VARIABLES ===== */
:root {
  --primary: #1E40AF;
  --primary-light: #2563EB;
  --accent: #60A5FA;
  --accent-dim: rgba(96,165,250,0.15);
  --bg: #070F1A;
  --bg2: #0D1B2E;
  --bg3: #0F2340;
  --surface: rgba(13,27,46,0.8);
  --surface2: rgba(15,35,64,0.6);
  --border: rgba(96,165,250,0.12);
  --border-hover: rgba(96,165,250,0.28);
  --text: #EFF6FF;
  --text2: #7FA8CC;
  --text3: #4B7A9E;
  --coin: #F59E0B;
  --success: #10B981;
  --danger: #EF4444;
  --warn: #F59E0B;
  --pro: #F59E0B;
  --radius-sm: 8px;
  --radius: 12px;
  --radius-lg: 18px;
  --radius-xl: 24px;
  --shadow: 0 4px 24px rgba(0,0,0,0.5);
  --shadow-lg: 0 8px 40px rgba(0,0,0,0.6);
  --glow: 0 0 20px rgba(96,165,250,0.2);
  --sidebar-w: 248px;
  --transition: 0.2s cubic-bezier(0.4,0,0.2,1);
}
[data-theme="light"] {
  --bg: #F5F9FF;
  --bg2: #EBF2FF;
  --bg3: #DDE9FF;
  --surface: rgba(255,255,255,0.9);
  --surface2: rgba(235,242,255,0.8);
  --border: rgba(30,64,175,0.12);
  --border-hover: rgba(30,64,175,0.28);
  --text: #0A1628;
  --text2: #3B5A8A;
  --text3: #7398BF;
  --shadow: 0 4px 24px rgba(30,64,175,0.1);
  --shadow-lg: 0 8px 40px rgba(30,64,175,0.15);
}

/* ===== RESET ===== */
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;transition:background var(--transition),color var(--transition);}
a{color:inherit;text-decoration:none;}
button{font-family:'Inter',sans-serif;cursor:pointer;border:none;}
input,textarea,select{font-family:'Inter',sans-serif;}
::-webkit-scrollbar{width:3px;height:3px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:10px;}
::-webkit-scrollbar-thumb:hover{background:var(--border-hover);}

/* ===== ANIMATIONS ===== */
@keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
@keyframes scaleIn{from{opacity:0;transform:scale(0.94);}to{opacity:1;transform:scale(1);}}
@keyframes slideRight{from{transform:translateX(-12px);opacity:0;}to{transform:translateX(0);opacity:1;}}
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.4;}}
@keyframes glow{0%,100%{box-shadow:0 0 12px rgba(96,165,250,0.3);}50%{box-shadow:0 0 28px rgba(96,165,250,0.6);}}
@keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}
@keyframes gradientShift{0%{background-position:0% 50%;}50%{background-position:100% 50%;}100%{background-position:0% 50%;}}
@keyframes particleDrift{from{transform:translateY(0) translateX(0);opacity:0.6;}to{transform:translateY(-100vh) translateX(20px);opacity:0;}}

/* ===== PARTICLES ===== */
.particles{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
.particle{position:absolute;border-radius:50%;background:radial-gradient(circle,rgba(96,165,250,0.6),transparent);animation:particleDrift linear infinite;}

/* ===== TYPOGRAPHY ===== */
.heading{font-family:'Space Grotesk',sans-serif;}
.h1{font-size:32px;font-weight:800;line-height:1.2;}
.h2{font-size:22px;font-weight:700;line-height:1.3;}
.h3{font-size:16px;font-weight:700;}
.label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.7px;color:var(--text2);}
.caption{font-size:12px;color:var(--text2);}
.mono{font-family:'Space Grotesk',sans-serif;letter-spacing:2px;}

/* ===== LAYOUT ===== */
.app{display:flex;min-height:100vh;}
.sidebar{width:var(--sidebar-w);background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:60;transition:transform var(--transition);overflow-y:auto;}
.main{margin-left:var(--sidebar-w);flex:1;display:flex;flex-direction:column;min-height:100vh;}
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;backdrop-filter:blur(12px);}
.page{padding:24px;animation:fadeUp 0.3s ease;flex:1;}

/* ===== SIDEBAR ===== */
.sidebar-brand{padding:20px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;}
.brand-icon{width:38px;height:38px;background:linear-gradient(135deg,#1E40AF,#3B82F6);border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:'Space Grotesk',sans-serif;font-weight:800;font-size:17px;color:#fff;flex-shrink:0;}
.brand-text .name{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:15px;letter-spacing:0.3px;}
.brand-text .sub{font-size:10px;color:var(--accent);opacity:0.8;margin-top:1px;}
.nav{padding:8px;}
.nav-group-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--text3);padding:10px 10px 4px;}
.nav-item{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:var(--radius-sm);cursor:pointer;transition:all var(--transition);color:var(--text2);font-size:13.5px;font-weight:500;margin-bottom:1px;border:1px solid transparent;}
.nav-item:hover{background:var(--accent-dim);color:var(--text);}
.nav-item.active{background:linear-gradient(135deg,rgba(30,64,175,0.3),rgba(96,165,250,0.15));color:var(--accent);border-color:rgba(96,165,250,0.2);}
.nav-item .nav-icon{width:18px;height:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0;opacity:0.7;}
.nav-item.active .nav-icon{opacity:1;}
.nav-badge{margin-left:auto;background:var(--danger);color:#fff;font-size:10px;font-weight:700;padding:1px 6px;border-radius:20px;min-width:18px;text-align:center;}

/* sidebar footer user card */
.sidebar-user{margin:8px;border:1px solid var(--border);border-radius:var(--radius);padding:10px;display:flex;align-items:center;gap:9px;cursor:pointer;transition:all var(--transition);}
.sidebar-user:hover{border-color:var(--border-hover);background:var(--accent-dim);}

/* ===== AVATAR ===== */
.avatar{border-radius:50%;background:linear-gradient(135deg,#1E40AF,#60A5FA);display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;font-family:'Space Grotesk',sans-serif;flex-shrink:0;}
.av-sm{width:30px;height:30px;font-size:12px;}
.av-md{width:38px;height:38px;font-size:15px;}
.av-lg{width:64px;height:64px;font-size:24px;}
.av-xl{width:80px;height:80px;font-size:30px;border:3px solid rgba(96,165,250,0.4);}

/* ===== TOPBAR ===== */
.topbar-left{display:flex;align-items:center;gap:12px;}
.topbar-title{font-family:'Space Grotesk',sans-serif;font-size:16px;font-weight:700;}
.topbar-right{display:flex;align-items:center;gap:8px;}
.coin-pill{display:flex;align-items:center;gap:5px;background:rgba(245,158,11,0.1);border:1px solid rgba(245,158,11,0.25);border-radius:20px;padding:5px 12px;font-size:13px;font-weight:700;color:var(--coin);}
.icon-btn{width:34px;height:34px;border-radius:var(--radius-sm);background:var(--surface2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all var(--transition);font-size:14px;color:var(--text2);position:relative;}
.icon-btn:hover{border-color:var(--border-hover);color:var(--text);background:var(--accent-dim);}
.notif-dot{position:absolute;top:5px;right:5px;width:7px;height:7px;border-radius:50%;background:var(--danger);border:1.5px solid var(--bg2);}
.lang-select{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:5px 8px;color:var(--text);font-size:12px;font-weight:600;cursor:pointer;outline:none;transition:all var(--transition);}
.lang-select:hover{border-color:var(--border-hover);}
.menu-btn{display:none;width:34px;height:34px;border-radius:var(--radius-sm);background:var(--surface2);border:1px solid var(--border);align-items:center;justify-content:center;cursor:pointer;font-size:16px;color:var(--text2);}

/* ===== BUTTONS ===== */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;border-radius:var(--radius-sm);font-size:13.5px;font-weight:600;transition:all var(--transition);cursor:pointer;border:none;white-space:nowrap;}
.btn-primary{background:linear-gradient(135deg,#1E40AF,#2563EB);color:#fff;padding:9px 18px;}
.btn-primary:hover{background:linear-gradient(135deg,#1D3FB5,#1E56E0);transform:translateY(-1px);box-shadow:0 4px 16px rgba(37,99,235,0.4);}
.btn-secondary{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:9px 18px;}
.btn-secondary:hover{border-color:var(--border-hover);background:var(--accent-dim);}
.btn-danger{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.2);color:var(--danger);padding:9px 18px;}
.btn-danger:hover{background:rgba(239,68,68,0.2);}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text2);padding:9px 18px;}
.btn-ghost:hover{border-color:var(--border-hover);color:var(--text);}
.btn-sm{padding:6px 12px;font-size:12px;}
.btn-xs{padding:4px 9px;font-size:11px;}
.btn-full{width:100%;}
.btn-lg{padding:13px 24px;font-size:15px;}
.btn-icon{width:34px;height:34px;padding:0;border-radius:var(--radius-sm);}
.btn:disabled{opacity:0.4;cursor:not-allowed;transform:none!important;}

/* ===== INPUTS ===== */
.form-group{margin-bottom:14px;}
.form-label{display:block;font-size:12px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:5px;}
.input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;color:var(--text);font-size:14px;outline:none;transition:all var(--transition);}
.input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(96,165,250,0.1);}
.input::placeholder{color:var(--text3);}
.textarea{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;color:var(--text);font-size:14px;outline:none;resize:vertical;min-height:80px;transition:all var(--transition);}
.textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(96,165,250,0.1);}
.textarea::placeholder{color:var(--text3);}
.select{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;color:var(--text);font-size:14px;outline:none;cursor:pointer;transition:all var(--transition);}
.select:focus{border-color:var(--accent);}
.select option{background:var(--bg2);}
.input-error{border-color:rgba(239,68,68,0.5)!important;}
.err-msg{font-size:12px;color:var(--danger);margin-top:4px;}
.alert{border-radius:var(--radius-sm);padding:10px 12px;font-size:13px;margin-bottom:12px;}
.alert-error{background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.2);color:var(--danger);}
.alert-success{background:rgba(16,185,129,0.08);border:1px solid rgba(16,185,129,0.2);color:var(--success);}
.alert-info{background:rgba(96,165,250,0.08);border:1px solid rgba(96,165,250,0.2);color:var(--accent);}

/* ===== CARDS ===== */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px;transition:border-color var(--transition);}
.card:hover{border-color:var(--border-hover);}
.card-flat{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;}
.card-hover{cursor:pointer;}
.card-hover:hover{transform:translateY(-2px);box-shadow:var(--shadow);}

/* ===== GRID ===== */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;}

/* ===== TAGS/CHIPS ===== */
.tag{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;}
.tag-blue{background:rgba(96,165,250,0.12);color:var(--accent);border:1px solid rgba(96,165,250,0.2);}
.tag-green{background:rgba(16,185,129,0.12);color:#10B981;border:1px solid rgba(16,185,129,0.2);}
.tag-yellow{background:rgba(245,158,11,0.12);color:var(--coin);border:1px solid rgba(245,158,11,0.2);}
.tag-red{background:rgba(239,68,68,0.12);color:var(--danger);border:1px solid rgba(239,68,68,0.2);}
.tag-gray{background:var(--surface2);color:var(--text2);border:1px solid var(--border);}
.tag-pro{background:linear-gradient(135deg,rgba(245,158,11,0.2),rgba(251,191,36,0.1));color:var(--pro);border:1px solid rgba(245,158,11,0.3);}
.chip{padding:6px 13px;border-radius:20px;font-size:13px;font-weight:500;border:1px solid var(--border);cursor:pointer;transition:all var(--transition);background:var(--surface2);color:var(--text2);}
.chip:hover{border-color:var(--accent);color:var(--text);}
.chip.on{background:rgba(96,165,250,0.12);border-color:rgba(96,165,250,0.35);color:var(--accent);}
.chips{display:flex;flex-wrap:wrap;gap:6px;}

/* ===== PROGRESS ===== */
.progress-track{background:var(--surface2);border-radius:100px;height:6px;overflow:hidden;}
.progress-fill{height:100%;border-radius:100px;background:linear-gradient(90deg,#1E40AF,#60A5FA);transition:width 0.6s ease;}

/* ===== DIVIDER ===== */
.divider{border:none;border-top:1px solid var(--border);margin:16px 0;}

/* ===== EMPTY STATE ===== */
.empty{text-align:center;padding:48px 16px;color:var(--text2);}
.empty .e-icon{font-size:36px;opacity:0.35;margin-bottom:10px;}
.empty .e-text{font-size:14px;font-weight:500;}
.empty .e-sub{font-size:12px;color:var(--text3);margin-top:4px;}

/* ===== LOADING ===== */
.spinner{width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite;display:inline-block;}
.loading-row{display:flex;align-items:center;gap:8px;color:var(--text2);font-size:13px;padding:16px;}

/* ===== TOGGLE ===== */
.toggle-wrap{position:relative;width:40px;height:22px;flex-shrink:0;}
.toggle-wrap input{opacity:0;width:0;height:0;position:absolute;}
.toggle-track{position:absolute;inset:0;background:var(--surface2);border:1px solid var(--border);border-radius:100px;transition:all var(--transition);cursor:pointer;}
.toggle-track::before{content:'';position:absolute;width:16px;height:16px;top:2px;left:2px;background:var(--text3);border-radius:50%;transition:all var(--transition);}
.toggle-wrap input:checked~.toggle-track{background:var(--primary);border-color:var(--primary);}
.toggle-wrap input:checked~.toggle-track::before{transform:translateX(18px);background:#fff;}

/* ===== AUTH SCREEN ===== */
.auth-screen{min-height:100vh;background:linear-gradient(135deg,#070F1A 0%,#0D1E3E 50%,#070F1A 100%);display:flex;align-items:center;justify-content:center;padding:20px;position:relative;}
.auth-box{background:rgba(13,27,46,0.9);backdrop-filter:blur(24px);border:1px solid rgba(96,165,250,0.15);border-radius:var(--radius-xl);padding:36px;width:100%;max-width:400px;position:relative;z-index:1;animation:scaleIn 0.35s ease;box-shadow:var(--shadow-lg);}
.auth-logo{display:flex;align-items:center;gap:12px;margin-bottom:28px;}
.auth-logo-icon{width:44px;height:44px;background:linear-gradient(135deg,#1E40AF,#3B82F6);border-radius:12px;display:flex;align-items:center;justify-content:center;font-family:'Space Grotesk',sans-serif;font-weight:800;font-size:19px;color:#fff;}
.auth-slogan{font-size:11px;color:var(--text2);margin-top:2px;}
.auth-steps{display:flex;gap:5px;margin-bottom:20px;}
.auth-step-dot{height:3px;border-radius:3px;background:var(--surface2);flex:1;transition:all 0.3s ease;}
.auth-step-dot.done{background:var(--accent);}
.role-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:6px;}
.role-card{background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--radius);padding:14px 10px;text-align:center;cursor:pointer;transition:all var(--transition);}
.role-card:hover{border-color:var(--border-hover);}
.role-card.on{border-color:var(--accent);background:rgba(96,165,250,0.08);}
.role-card .rc-icon{font-size:22px;margin-bottom:5px;font-family:'Space Grotesk',sans-serif;}
.role-card .rc-name{font-size:13px;font-weight:600;}
.role-card .rc-desc{font-size:11px;color:var(--text2);margin-top:2px;}
.captcha-row{display:flex;align-items:center;gap:10px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:11px 12px;cursor:pointer;transition:all var(--transition);margin-bottom:14px;}
.captcha-row:hover{border-color:var(--border-hover);}
.captcha-check{width:18px;height:18px;border:1.5px solid var(--border);border-radius:4px;display:flex;align-items:center;justify-content:center;transition:all var(--transition);flex-shrink:0;}
.captcha-check.done{background:var(--success);border-color:var(--success);}
.auth-link{color:var(--accent);cursor:pointer;font-weight:500;}
.auth-link:hover{text-decoration:underline;}

/* ===== ONBOARDING ===== */
.onboard-screen{min-height:100vh;background:var(--bg);display:flex;align-items:center;justify-content:center;padding:20px;}
.onboard-box{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-xl);padding:32px;width:100%;max-width:500px;max-height:88vh;overflow-y:auto;animation:scaleIn 0.3s ease;}

/* ===== HOME ===== */
.ai-banner{background:linear-gradient(135deg,rgba(30,64,175,0.25) 0%,rgba(96,165,250,0.1) 100%);border:1px solid rgba(96,165,250,0.2);border-radius:var(--radius-lg);padding:22px;position:relative;overflow:hidden;margin-bottom:16px;}
.ai-banner::after{content:'';position:absolute;right:-40px;top:-40px;width:180px;height:180px;background:radial-gradient(circle,rgba(96,165,250,0.12),transparent 70%);pointer-events:none;}
.stat-row{display:flex;align-items:center;gap:12px;}
.stat-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:16px;}
.stat-icon-blue{background:rgba(96,165,250,0.12);}
.stat-icon-gold{background:rgba(245,158,11,0.12);}
.stat-icon-green{background:rgba(16,185,129,0.12);}
.stat-icon-purple{background:rgba(139,92,246,0.12);}
.stat-val{font-family:'Space Grotesk',sans-serif;font-size:21px;font-weight:700;line-height:1;}
.stat-lbl{font-size:11px;color:var(--text2);margin-top:3px;}

/* ===== TASKS ===== */
.task-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:15px;cursor:pointer;transition:all var(--transition);}
.task-card:hover{border-color:var(--border-hover);transform:translateY(-1px);box-shadow:var(--shadow);}
.task-reward{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:14px;color:var(--coin);}
.filter-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px;}

/* ===== LEADERBOARD ===== */
.leader-row{display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:var(--radius-sm);cursor:pointer;transition:all var(--transition);}
.leader-row:hover{background:var(--surface2);}
.rank-num{width:26px;text-align:center;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:13px;color:var(--text3);}
.rank-1{color:#F59E0B;}
.rank-2{color:#94A3B8;}
.rank-3{color:#CD7F32;}

/* ===== RANK BADGE ===== */
.rank-badge{display:inline-flex;align-items:center;gap:4px;padding:2px 7px;border-radius:20px;font-size:11px;font-weight:700;}
.rb-s{background:linear-gradient(135deg,rgba(245,158,11,0.2),rgba(251,191,36,0.1));color:#F59E0B;border:1px solid rgba(245,158,11,0.3);}
.rb-a{background:rgba(96,165,250,0.12);color:var(--accent);border:1px solid rgba(96,165,250,0.25);}
.rb-b{background:rgba(16,185,129,0.12);color:#10B981;border:1px solid rgba(16,185,129,0.25);}
.rb-c{background:rgba(245,158,11,0.1);color:#D97706;border:1px solid rgba(245,158,11,0.2);}
.rb-d{background:var(--surface2);color:var(--text2);border:1px solid var(--border);}

/* ===== AI CHAT ===== */
.ai-wrap{display:flex;height:calc(100vh - 56px);}
.ai-modes{width:190px;border-right:1px solid var(--border);padding:10px;flex-shrink:0;overflow-y:auto;}
.ai-mode-item{display:flex;align-items:center;gap:8px;padding:9px 10px;border-radius:var(--radius-sm);cursor:pointer;font-size:13px;font-weight:500;color:var(--text2);transition:all var(--transition);margin-bottom:2px;}
.ai-mode-item:hover{background:var(--surface2);color:var(--text);}
.ai-mode-item.on{background:rgba(96,165,250,0.1);color:var(--accent);}
.ai-chat{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.chat-msgs{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:10px;}
.msg{max-width:78%;animation:fadeUp 0.2s ease;}
.msg-me{align-self:flex-end;}
.msg-ai{align-self:flex-start;}
.bubble{padding:11px 14px;border-radius:14px;font-size:13.5px;line-height:1.65;}
.msg-me .bubble{background:linear-gradient(135deg,#1E40AF,#2563EB);color:#fff;border-bottom-right-radius:3px;}
.msg-ai .bubble{background:var(--surface);border:1px solid var(--border);border-bottom-left-radius:3px;}
.msg-time{font-size:10px;color:var(--text3);margin-top:3px;text-align:right;}
.chat-input-bar{padding:12px 16px;border-top:1px solid var(--border);display:flex;gap:8px;}
.chat-input{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 14px;color:var(--text);font-size:13.5px;outline:none;resize:none;}
.chat-input:focus{border-color:var(--accent);}
.agent-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.agent-box{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px;animation:fadeUp 0.3s ease;}
.agent-box.thinking{border-color:rgba(96,165,250,0.3);animation:glow 1.5s infinite;}
.agent-done{border-color:rgba(16,185,129,0.3);}

/* ===== STORE ===== */
.store-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px;text-align:center;transition:all var(--transition);}
.store-card:hover{border-color:var(--border-hover);transform:translateY(-2px);}
.store-card.featured{border-color:rgba(245,158,11,0.3);background:linear-gradient(135deg,rgba(245,158,11,0.04),transparent);}
.cc-preview{background:linear-gradient(135deg,#1E3A8A,#1E40AF,#2563EB);border-radius:12px;padding:20px;color:#fff;margin-bottom:16px;}
.cc-number{font-family:'Space Grotesk',sans-serif;font-size:15px;letter-spacing:3px;margin:12px 0;}
.card-input{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;color:var(--text);font-size:14px;font-family:'Space Grotesk',sans-serif;width:100%;outline:none;letter-spacing:1px;}
.card-input:focus{border-color:var(--accent);}

/* ===== SLOTS ===== */
.slots-wrap{overflow-x:auto;}
.slots-table{display:grid;grid-template-columns:repeat(7,minmax(90px,1fr));gap:6px;min-width:650px;}
.slot-col-head{text-align:center;padding:8px 0;font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:0.5px;}
.slot-cell{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:7px 4px;text-align:center;font-size:11px;cursor:pointer;transition:all var(--transition);color:var(--text2);line-height:1.3;}
.slot-cell:hover{border-color:var(--accent);color:var(--text);}
.slot-mine{background:rgba(96,165,250,0.1);border-color:rgba(96,165,250,0.3);color:var(--accent);}
.slot-taken{background:rgba(16,185,129,0.07);border-color:rgba(16,185,129,0.2);color:#10B981;cursor:default;}
.slot-blocked{background:rgba(239,68,68,0.04);border-color:rgba(239,68,68,0.15);color:var(--danger);cursor:default;}

/* ===== PROFILE MODAL ===== */
.profile-banner{height:88px;background:linear-gradient(135deg,#1E40AF,#2563EB,#3B82F6);border-radius:var(--radius-lg) var(--radius-lg) 0 0;position:relative;}
.profile-av-wrap{position:absolute;bottom:-32px;left:20px;}
.profile-actions{position:absolute;bottom:10px;right:14px;display:flex;gap:6px;}

/* ===== DM CHAT ===== */
.dm-wrap{display:flex;height:calc(100vh - 56px);}
.dm-list{width:220px;border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.dm-item{display:flex;align-items:center;gap:9px;padding:11px 12px;cursor:pointer;border-bottom:1px solid var(--border);transition:all var(--transition);}
.dm-item:hover{background:var(--surface2);}
.dm-item.on{background:rgba(96,165,250,0.07);}
.dm-unread{background:var(--accent);color:#fff;font-size:9px;font-weight:700;padding:2px 5px;border-radius:10px;margin-left:auto;}
.dm-chat-area{flex:1;display:flex;flex-direction:column;}

/* ===== NOTIF PANEL ===== */
.notif-panel{position:fixed;top:56px;right:12px;width:300px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);box-shadow:var(--shadow-lg);z-index:200;max-height:380px;overflow-y:auto;animation:scaleIn 0.2s ease;}
.notif-item{padding:12px 14px;border-bottom:1px solid var(--border);cursor:pointer;transition:all var(--transition);}
.notif-item:hover{background:var(--surface2);}
.notif-unread{background:rgba(96,165,250,0.04);}
.notif-dot-inline{width:6px;height:6px;border-radius:50%;background:var(--accent);flex-shrink:0;}

/* ===== MODAL ===== */
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,0.65);backdrop-filter:blur(6px);z-index:300;display:flex;align-items:center;justify-content:center;padding:16px;animation:fadeIn 0.15s ease;}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-xl);width:100%;max-width:480px;max-height:88vh;overflow-y:auto;box-shadow:var(--shadow-lg);animation:scaleIn 0.25s ease;}
.modal-lg{max-width:620px;}
.modal-xl{max-width:780px;}
.modal-hd{padding:18px 20px 0;display:flex;align-items:center;justify-content:space-between;}
.modal-title{font-family:'Space Grotesk',sans-serif;font-size:17px;font-weight:700;}
.modal-close{width:28px;height:28px;border-radius:6px;background:var(--surface2);border:1px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--text2);transition:all var(--transition);}
.modal-close:hover{border-color:rgba(239,68,68,0.3);color:var(--danger);}
.modal-bd{padding:16px 20px;}
.modal-ft{padding:0 20px 18px;display:flex;gap:8px;justify-content:flex-end;}

/* ===== MISC ===== */
.star-row{display:flex;gap:4px;}
.star-btn{font-size:20px;cursor:pointer;opacity:0.25;transition:opacity var(--transition);}
.star-btn.lit{opacity:1;}
.review-card{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px;margin-bottom:8px;}
.module-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:15px;cursor:pointer;transition:all var(--transition);}
.module-card:hover{border-color:var(--border-hover);transform:translateY(-1px);}
.user-row{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--radius-sm);cursor:pointer;transition:all var(--transition);}
.user-row:hover{background:var(--surface2);}
.cam-box{background:rgba(0,0,0,0.4);border:1px solid var(--border);border-radius:var(--radius);aspect-ratio:16/9;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;}
.cam-live{position:absolute;top:8px;right:8px;background:var(--danger);border-radius:4px;padding:3px 7px;font-size:10px;font-weight:700;color:#fff;animation:pulse 1.5s infinite;}

/* ===== TOAST ===== */
.toast-container{position:fixed;bottom:20px;right:20px;z-index:999;display:flex;flex-direction:column;gap:6px;}
.toast{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:11px 14px;font-size:13px;display:flex;align-items:center;gap:9px;min-width:230px;max-width:320px;box-shadow:var(--shadow);animation:fadeUp 0.3s ease;}
.toast-s{border-color:rgba(16,185,129,0.3);}
.toast-e{border-color:rgba(239,68,68,0.3);}
.toast-i{border-color:rgba(96,165,250,0.25);}
.toast-w{border-color:rgba(245,158,11,0.3);}
.t-close{margin-left:auto;cursor:pointer;color:var(--text3);font-size:14px;flex-shrink:0;}

/* ===== RESPONSIVE ===== */
@media(max-width:800px){
  .sidebar{transform:translateX(calc(-1 * var(--sidebar-w)));box-shadow:none;}
  .sidebar.open{transform:translateX(0);box-shadow:var(--shadow-lg);}
  .main{margin-left:0;}
  .menu-btn{display:flex;}
  .g3,.g4{grid-template-columns:1fr 1fr;}
  .g2{grid-template-columns:1fr;}
  .ai-modes{display:none;}
  .dm-list{display:none;}
  .dm-list.show{display:flex;}
  .slots-table{grid-template-columns:repeat(4,minmax(80px,1fr));}
}
@media(max-width:480px){
  .auth-box{padding:24px 18px;}
  .page{padding:14px;}
  .g3,.g4{grid-template-columns:1fr;}
  .agent-grid{grid-template-columns:1fr 1fr;}
}

function safeLS(k,def){try{const v=localStorage.getItem(k);return v?JSON.parse(v):JSON.parse(def);}catch(e){console.warn('LS parse error',k,e);return JSON.parse(def);}}
const S = {
  users: safeLS('aq_users','[]'),

function save(){
  ['users','tasks','msgs','modules','reviews','slots','notifs','modLog','reports','dailyActive'].forEach(k=>localStorage.setItem('aq_'+k,JSON.stringify(S[k]||[])));
}
function saveCU(){
  localStorage.setItem('aq_cu',JSON.stringify(CU));
  S.users = S.users.map(u=>u.id===CU.id?CU:u);
  save();
}

function createParticles(){
  const el=document.createElement('div');el.className='particles';
  for(let i=0;i<14;i++){
    const p=document.createElement('div');p.className='particle';
    const sz=Math.random()*4+2;
    p.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;bottom:${Math.random()*20-10}%;
      animation-duration:${12+Math.random()*18}s;animation-delay:${Math.random()*10}s;opacity:${Math.random()*0.4+0.1};`;
    el.appendChild(p);
  }
  return el;
}

/* ============================================================
   GEMINI
   ============================================================ */
const GK='AIzaSyCfoRiGF2fYevaxCMGD8xzFj-G-5JhGbvA';
async function callGemini(prompt,sys=''){
  try{
    const r=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GK}`,{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({contents:[{parts:[{text:(sys?sys+'\n\n':'')+prompt}]}],generationConfig:{maxOutputTokens:900}})
    });
    const d=await r.json();
    return d.candidates?.[0]?.content?.parts?.[0]?.text||'No response';
  }catch{return lang==='en'?'AI temporarily unavailable.':lang==='kz'?'ИИ уақытша қол жетімсіз.':'ИИ временно недоступен.';}
}
async function checkIIN(iin){
  if(!/^\d{12}$/.test(iin))return{ok:false,msg:lang==='en'?'IIN must be 12 digits':lang==='kz'?'ЖСН 12 саннан тұруы керек':'ИИН должен содержать 12 цифр'};
  if(iin[0]==='7'||iin[0]==='8')return{ok:true};
  return{ok:false,msg:lang==='en'?'IIN must start with 7 or 8':lang==='kz'?'ЖСН 7 немесе 8-ден басталуы керек':'ИИН должен начинаться с 7 или 8'};
}
async function aiCareer(user){
  const p=`Student profile: strong subjects: ${(user.strongSubjects||[]).join(', ')||'General'}, weak: ${(user.weakSubjects||[]).join(', ')||'None'}, grade: ${user.grade||10}.
Respond in English with JSON only (no markdown):
{"profession":"...","income":"e.g. $3000-$6000","description":"2 sentences about career path","skills":["a","b","c"]}`;
  try{const r=await callGemini(p);return JSON.parse(r.replace(/```json|```/g,'').trim());}
  catch{return{profession:'Software Engineer',income:'$4,000–$8,000',description:'Your analytical mindset positions you well for a technology career. Continued focus on your strong subjects will open doors to top universities.',skills:['Problem Solving','Critical Thinking','Adaptability']};}
}

function rankBadge(r){
  r=parseFloat(r)||0;
  if(r>=4.5)return`<span class="rank-badge rb-s">S ${r.toFixed(1)}</span>`;
  if(r>=4.0)return`<span class="rank-badge rb-a">A ${r.toFixed(1)}</span>`;
  if(r>=3.0)return`<span class="rank-badge rb-b">B ${r.toFixed(1)}</span>`;
  if(r>=2.0)return`<span class="rank-badge rb-c">C ${r.toFixed(1)}</span>`;
  return`<span class="rank-badge rb-d">D ${r.toFixed(1)}</span>`;
}
function roleLabel(u){
  if(u.role==='teacher')return lang==='en'?'Teacher':lang==='kz'?'Мұғалім':'Учитель';
  if((u.rating||0)>=4.0)return lang==='en'?'Tutor':lang==='kz'?'Тьютор':'Тьютор';
  return lang==='en'?'Student':lang==='kz'?'Оқушы':'Ученик';
}

function handleEmailStep(){
  const email=document.getElementById('authEmail').value.trim().toLowerCase();
  if(!email||!email.includes('@')){setAuthErr(lang==='en'?'Enter valid email':lang==='kz'?'Жарамды email енгізіңіз':'Введите корректный email');return;}
  const existing=S.users.find(u=>u.email===email);
  if(existing){setAuthErr(lang==='en'?`Account exists. <span class="auth-link" onclick="renderLogin()">Sign in</span>`:lang==='kz'?`Аккаунт бар. <span class="auth-link" onclick="renderLogin()">Кіру</span>`:`Аккаунт существует. <span class="auth-link" onclick="renderLogin()">Войдите</span>`);return;}
  regData.email=email;regStep=2;captchaDone=false;renderAuthStep();
}

function pickRole(r){
  regData.role=r;
  ['student','teacher'].forEach(id=>{
    document.getElementById('rc_'+id)?.classList.toggle('on',id===r);
  });
  const iin=document.getElementById('iinBlock');
  if(iin)iin.style.display=r==='teacher'?'block':'none';
}

function toggleCaptcha(){
  captchaDone=!captchaDone;
  const el=document.getElementById('captchaCheck');
  if(el){el.classList.toggle('done',captchaDone);el.innerHTML=captchaDone?'&#10003;':'';}
}

async function handleRegister(){
  const name=document.getElementById('regName').value.trim();
  const pass=document.getElementById('regPass').value;
  if(!name){setAuthErr(lang==='en'?'Enter your name':lang==='kz'?'Атыңызды енгізіңіз':'Введите имя');return;}
  if(pass.length<6){setAuthErr(lang==='en'?'Password min 6 chars':lang==='kz'?'Құпия сөз кемінде 6 таңба':'Пароль минимум 6 символов');return;}
  if(!captchaDone){setAuthErr(lang==='en'?'Confirm you are not a robot':lang==='kz'?'Робот еместігіңізді растаңыз':'Подтвердите что вы не робот');return;}
  if(regData.role==='teacher'){
    const iin=document.getElementById('regIIN').value.trim();
    const c=await checkIIN(iin);
    if(!c.ok){setAuthErr(c.msg);return;}
    regData.iin=iin;
  }

let obStep=0;let obData={grade:9,strongSubjects:[],weakSubjects:[],strongPct:'70-100',weakPct:'30-60',bio:''};

function showOnboarding(){
  const root=document.getElementById('root');
  root.innerHTML=`<div class="onboard-screen"><div class="onboard-box" id="obBox"></div></div>`;
  obStep=0;renderObStep();
}
function renderObStep(){
  const steps=[
    {k:'onbClass',sk:'onbClassSub'},
    {k:'onbStrong',sk:'onbStrongSub'},
    {k:'onbWeak',sk:'onbWeakSub'},
    {k:'onbLevel',sk:'onbLevelSub'},
    {k:'onbAbout',sk:'onbAboutSub'},
  ];
  const s=steps[obStep];
  let body='';
  if(obStep===0){
    body=`<div class="chips">${[7,8,9,10,11].map(g=>`<div class="chip${obData.grade===g?' on':''}" onclick="obData.grade=${g};renderObStep()">${g}</div>`).join('')}</div>`;
  }else if(obStep===1){
    body=`<div class="chips">${subjects().map((s,i)=>`<div class="chip${obData.strongSubjects.includes(i)?' on':''}" onclick="toggleObSubj('strong',${i})">${s}</div>`).join('')}</div>`;
  }else if(obStep===2){
    body=`<div class="chips">${subjects().map((s,i)=>`<div class="chip${obData.weakSubjects.includes(i)?' on':''}" onclick="toggleObSubj('weak',${i})">${s}</div>`).join('')}</div>`;
  }else if(obStep===3){
    body=`<div style="display:flex;flex-direction:column;gap:16px;">
      <div>
        <div style="font-size:12px;font-weight:600;color:var(--accent);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;">${lang==='en'?'Good subjects — your level':lang==='kz'?'Күшті пәндер — деңгейіңіз':'Хорошие предметы — ваш уровень'}</div>
        <div class="chips">
          ${['70%','80%','90%','100%'].map(p=>`<div class="chip${obData.strongPct===p?' on':''}" onclick="obData.strongPct='${p}';renderObStep()">${p}</div>`).join('')}
        </div>
      </div>
      <div>
        <div style="font-size:12px;font-weight:600;color:rgba(239,68,68,0.8);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;">${lang==='en'?'Weak subjects — your level':lang==='kz'?'Әлсіз пәндер — деңгейіңіз':'Слабые предметы — ваш уровень'}</div>
        <div class="chips">
          ${['30%','40%','50%','60%'].map(p=>`<div class="chip${obData.weakPct===p?' on':''}" onclick="obData.weakPct='${p}';renderObStep()" style="${obData.weakPct===p?'border-color:rgba(239,68,68,.4);color:var(--danger);':''}">${p}</div>`).join('')}
        </div>
      </div>
    </div>`;
  }else{
    body=`<textarea class="textarea" id="obBio" placeholder="..." style="min-height:100px;">${obData.bio}</textarea>`;
  }
  document.getElementById('obBox').innerHTML=`
    <div style="margin-bottom:18px;">
      <div class="progress-track"><div class="progress-fill" style="width:${((obStep+1)/5*100).toFixed(0)}%"></div></div>
      <div class="caption" style="margin-top:5px;">${obStep+1} / 5</div>
    </div>
    <div class="h2 heading" style="margin-bottom:4px;">${t(s.k)}</div>
    <p class="caption" style="margin-bottom:16px;">${t(s.sk)}</p>
    ${body}
    <div style="display:flex;gap:8px;margin-top:20px;">
      ${obStep>0?`<button class="btn btn-ghost" onclick="obStep--;renderObStep()">← ${t('back')}</button>`:''}
      <button class="btn btn-primary" style="flex:1;" onclick="obNext()">${obStep<4?t('next'):t('start')}</button>
    </div>`;
}
function toggleObSubj(type,idx){
  const arr=obData[type+'Subjects'];
  const i=arr.indexOf(idx);
  if(i>=0)arr.splice(i,1);else arr.push(idx);
  renderObStep();
}
function obNext(){
  if(obStep===4){
    const bio=document.getElementById('obBio')?.value||'';
    obData.bio=bio;
    const subs=subjects();
    CU.grade=obData.grade;
    CU.strongSubjects=obData.strongSubjects.map(i=>subs[i]);
    CU.weakSubjects=obData.weakSubjects.map(i=>subs[i]);
    CU.strongPct=obData.strongPct||'70-100';CU.weakPct=obData.weakPct||'30-60';CU.bio=bio;CU.onboarded=true;
    saveCU();
    renderApp();
    toast(lang==='en'?'Welcome! 250 coins added':lang==='kz'?'Қош келдіңіз! 250 монета берілді':'Добро пожаловать! +250 монет','s');
  }else{obStep++;renderObStep();}
}

function applyTaskFilters(){
  let tasks=[...S.tasks];
  const sf=document.getElementById('tSubjFilter')?.value||'';
  if(sf)tasks=tasks.filter(t=>t.subject===sf);
  if(taskFilters.status)tasks=tasks.filter(t=>{
    const map={[t_('open')]:'Open',[t_('inprog')]:'In progress',[t_('done')]:'Completed'};
    const stat=map[taskFilters.status]||taskFilters.status;
    return t.status===stat||t.status===taskFilters.status;
  });
  tasks.sort((a,b)=>(b.reward||0)-(a.reward||0));
  const el=document.getElementById('tasksList');
  if(!el)return;
  if(!tasks.length){el.innerHTML=`<div class="empty"><div class="e-text">${t('noTasks')}</div></div>`;return;}
  el.innerHTML=tasks.map(task=>{
    const auth=S.users.find(u=>u.id===task.authorId);
    const statusMap={'Open':'tag-blue','In progress':'tag-yellow','Completed':'tag-green','On review':'tag-yellow'};
    const statusLabel={'Open':t('open'),'In progress':t('inprog'),'Completed':t('done'),'On review':t('review')};
    return`<div class="task-card" onclick="openTaskModal('${task.id}')" style="margin-bottom:8px;">
      <div style="display:flex;justify-content:space-between;gap:10px;align-items:flex-start;margin-bottom:8px;">
        <div style="min-width:0;">
          <div style="font-weight:600;font-size:14.5px;margin-bottom:2px;">${task.title}</div>
          <div class="caption">${t('by')} ${auth?.name||'?'} ${task.subject?'— '+task.subject:''}</div>
        </div>
        <div class="task-reward" style="flex-shrink:0;">C ${task.reward||0}</div>
      </div>
      ${task.desc?`<div style="font-size:13px;color:var(--text2);margin-bottom:8px;">${task.desc.substring(0,90)}${task.desc.length>90?'...':''}</div>`:''}
      <div style="display:flex;align-items:center;justify-content:space-between;">
        <span class="tag ${statusMap[task.status]||'tag-gray'}">${statusLabel[task.status]||task.status}</span>
        <div style="display:flex;align-items:center;gap:6px;">${task.deadline?`<span class="caption">${new Date(task.deadline).toLocaleDateString()}</span>`:''} ${reportBtn(task.authorId,task.title,'task',task.id)}</div>
      </div>
    </div>`;
  }).join('');
}
function t_(k){return T.ru[k]||k;}

function openCreateTask(){
  openModal(`<div class="modal-hd"><div class="modal-title">${t('createTask')}</div><div class="modal-close" onclick="closeModal()">x</div></div>

function doCreateTask(){
  const title=document.getElementById('tTitle').value.trim();
  if(!title){toast(lang==='en'?'Enter title':lang==='kz'?'Тақырыпты енгізіңіз':'Введите название','e');return;}
  const task={id:'t'+Date.now(),title,desc:document.getElementById('tDesc').value,subject:document.getElementById('tSubj').value,reward:parseInt(document.getElementById('tReward').value)||50,deadline:document.getElementById('tDeadline').value||null,authorId:CU.id,status:'Open',tutorId:null,createdAt:Date.now()};
  S.tasks.push(task);save();
  S.users.filter(u=>u.id!==CU.id&&([...(u.strongSubjects||[]),...(u.weakSubjects||[])]).includes(task.subject)).forEach(u=>addNotif(u.id,`${CU.name}: "${task.title}" (${task.subject} — C${task.reward})`,'task'));
  closeModal();renderTasks();toast(lang==='en'?'Task created!':lang==='kz'?'Тапсырма жасалды!':'Задача создана!','s');
}
function openTaskModal(id){
  const task=S.tasks.find(t=>t.id===id);if(!task)return;
  const auth=S.users.find(u=>u.id===task.authorId);
  const tutor=task.tutorId?S.users.find(u=>u.id===task.tutorId):null;
  const isAuthor=task.authorId===CU.id;
  const isTutor=task.tutorId===CU.id;
  const canTake=task.status==='Open'&&!isAuthor;
  const statusLabel={'Open':t('open'),'In progress':t('inprog'),'Completed':t('done'),'On review':t('review')};
  openModal(`<div class="modal-hd"><div class="modal-title">${task.title}</div><div class="modal-close" onclick="closeModal()">x</div></div>
    <div class="modal-bd">
      <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px;">
        ${task.subject?`<span class="tag tag-blue">${task.subject}</span>`:''}
        <span class="tag tag-yellow">C ${task.reward}</span>
        <span class="tag tag-gray">${statusLabel[task.status]||task.status}</span>
      </div>
      ${task.desc?`<p style="font-size:14px;color:var(--text2);margin-bottom:14px;line-height:1.6;">${task.desc}</p>`:''}
      <div class="caption">${lang==='en'?'Author':lang==='kz'?'Автор':'Автор'}: <strong style="color:var(--text);">${auth?.name||'?'}</strong></div>
      ${tutor?`<div class="caption" style="margin-top:4px;">${lang==='en'?'Executor':lang==='kz'?'Орындаушы':'Исполнитель'}: <strong style="color:var(--text);">${tutor.name}</strong></div>`:''}
      ${task.deadline?`<div class="caption" style="margin-top:4px;">${lang==='en'?'Deadline':lang==='kz'?'Мерзім':'Срок'}: ${new Date(task.deadline).toLocaleString()}</div>`:''}
    </div>
    <div class="modal-ft">
      ${canTake&&task.status==='Open'?`<button class="btn btn-primary" onclick="takeTask('${id}')">${t('takeTask')}</button>`:''}
      ${isTutor&&task.status==='In progress'?`<button class="btn btn-primary" onclick="markTaskDone('${id}')">${t('markDone')}</button>`:''}
      ${isAuthor&&(task.status==='In progress'||task.status==='On review')?`<button class="btn btn-primary" onclick="confirmTask('${id}')">${t('confirmTask')}</button>`:''}
      <button class="btn btn-ghost" onclick="closeModal()">${t('close')}</button>
    </div>`);
}
function takeTask(id){
  const t=S.tasks.find(t=>t.id===id);if(!t||t.status!=='Open')return;
  t.tutorId=CU.id;t.status='In progress';save();closeModal();renderTasks();
  toast(lang==='en'?'Task taken!':lang==='kz'?'Тапсырма алынды!':'Задача взята!','s');
}
function markTaskDone(id){
  const t=S.tasks.find(t=>t.id===id);if(!t)return;
  t.status='On review';save();
  addNotif(t.authorId,`"${t.title}" ${lang==='en'?'completed, please confirm':lang==='kz'?'орындалды, растаңыз':'выполнена, подтвердите!'}`,'task');
  closeModal();renderTasks();toast(lang==='en'?'Sent for review':lang==='kz'?'Тексеруге жіберілді':'Отправлено на проверку','s');
}
function confirmTask(id){
  const task=S.tasks.find(t=>t.id===id);if(!task)return;
  task.status='Completed';
  const tutor=S.users.find(u=>u.id===task.tutorId);
  if(tutor){
    tutor.coins=(tutor.coins||0)+task.reward;
    tutor.rating=Math.min(5.0,parseFloat(((tutor.rating||0)+0.3).toFixed(1)));
    if((tutor.rating||0)>=4.0&&tutor.role==='student'){
      tutor.role='tutor';
      addNotif(tutor.id,lang==='en'?'Congratulations! You became a Tutor (rating 4.0+)':lang==='kz'?'Тьютор мәртебесі берілді (4.0+)':'Поздравляем! Вы стали Тьютором (рейтинг 4.0+)','success');
    }
    S.users=S.users.map(u=>u.id===tutor.id?tutor:u);
    if(tutor.id===CU.id){CU=tutor;saveCU();}
    else save();
    addNotif(tutor.id,`+C${task.reward} ${lang==='en'?'for':lang==='kz'?'үшін':'за'} "${task.title}"`, 'success');
  }
  save();closeModal();renderTasks();updateBadges();
  toast(lang==='en'?'Confirmed! Coins sent':lang==='kz'?'Расталды! Монеталар жіберілді':'Подтверждено! Монеты начислены','s');
  if(task.tutorId)openReviewModal(task.tutorId,id);
}

function renderSlots(){
  const today=new Date();
  const days=Array.from({length:7},(_,i)=>{const d=new Date(today);d.setDate(today.getDate()+i);return d;});
  const hours=[9,10,11,12,13,14,15,16,17];
  document.getElementById('pageArea').innerHTML=`<div class="page">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
      <span class="h3 heading">${t('slots')}</span>
      ${CU.role!=='student'?`<div style="display:flex;align-items:center;gap:8px;">
        <label class="toggle-wrap"><input type="checkbox" ${CU.available?'checked':''} onchange="CU.available=this.checked;saveCU();toast('${lang==='en'?'Availability updated':lang==='kz'?'Қол жетімділік жаңартылды':'Доступность обновлена'}','s');"><div class="toggle-track"></div></label>
        <span style="font-size:13px;color:var(--text2);">${t('available')}</span>
      </div>`:''}
    </div>
    <div class="slots-wrap">
      <div class="slots-table">
        ${days.map(d=>`<div>
          <div class="slot-col-head">${d.toLocaleDateString(lang==='kz'?'kk-KZ':lang==='en'?'en-US':'ru-RU',{weekday:'short'}).toUpperCase()}</div>
          ${hours.map(h=>{
            const sid=`${d.toDateString()}_${h}`;
            const slot=S.slots.find(s=>s.id===sid);
            let cls='';
            if(slot?.blocked)cls='slot-blocked';
            else if(slot?.by===CU.id)cls='slot-mine';
            else if(slot?.by)cls='slot-taken';
            return`<div class="slot-cell ${cls}" onclick="bookSlot('${sid}',${h})">${h}:00</div>`;
          }).join('')}
        </div>`).join('')}
      </div>
    </div>
    <div style="display:flex;gap:14px;margin-top:12px;flex-wrap:wrap;">
      <div style="display:flex;align-items:center;gap:5px;" class="caption"><div style="width:10px;height:10px;border-radius:2px;background:rgba(96,165,250,.1);border:1px solid rgba(96,165,250,.3);"></div>${t('mySlots')}</div>
      <div style="display:flex;align-items:center;gap:5px;" class="caption"><div style="width:10px;height:10px;border-radius:2px;background:rgba(16,185,129,.07);border:1px solid rgba(16,185,129,.2);"></div>${t('taken')}</div>
      <div style="display:flex;align-items:center;gap:5px;" class="caption"><div style="width:10px;height:10px;border-radius:2px;background:rgba(239,68,68,.04);border:1px solid rgba(239,68,68,.15);"></div>${t('blocked')}</div>
    </div>
  </div>`;
}
function bookSlot(sid,h){
  const ex=S.slots.find(s=>s.id===sid);
  if(ex?.blocked){toast(lang==='en'?'Slot blocked':lang==='kz'?'Слот бұғатталған':'Слот заблокирован','e');return;}
  if(ex?.by&&ex.by!==CU.id){toast(lang==='en'?'Already booked':lang==='kz'?'Алынған':'Занято','e');return;}
  if(ex?.by===CU.id){S.slots=S.slots.filter(s=>s.id!==sid);save();renderSlots();toast(lang==='en'?'Cancelled':lang==='kz'?'Бас тартылды':'Отменено','i');return;}
  S.slots.push({id:sid,h,by:CU.id,ts:Date.now()});save();renderSlots();
  toast(lang==='en'?`Slot ${h}:00 booked!`:lang==='kz'?`${h}:00 слоты бронирленді!`:`Слот ${h}:00 забронирован!`,'s');
}

async function sendAI(){
  const inp=document.getElementById('aiInput');if(!inp)return;
  const text=inp.value.trim();if(!text)return;
  const uCount=aiMsgs.filter(m=>m.r==='u').length;
  if(!CU.isPro&&uCount>=20){toast(lang==='en'?'Limit reached. Buy PRO!':lang==='kz'?'Шек жетті. PRO сатып алыңыз!':'Лимит 20 сообщений. Купите PRO!','w');return;}
  inp.value='';
  const time=new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  aiMsgs.push({r:'u',c:text,t:time});
  renderAIMsgs();
  const el=document.getElementById('aiMsgs');
  const ld=document.createElement('div');ld.className='msg msg-ai';ld.id='aiLoader';
  ld.innerHTML=`<div class="bubble"><span class="spinner"></span></div>`;
  if(el){el.appendChild(ld);el.scrollTop=el.scrollHeight;}
  let sys=lang==='en'?'You are an educational AI assistant for AqboHub platform. Answer clearly and with examples.':lang==='kz'?'Сіз AqboHub платформасының білім беру ИИ-сіз. Қазақша нақты және мысалдармен жауап беріңіз.':'Ты образовательный ИИ-ассистент платформы AqboHub. Отвечай на русском языке, подробно, с примерами.';
  if(aiMode==='sor')sys=lang==='en'?`You are an expert in Kazakhstani school exams (SOR/SOCh). Help prepare for: ${text}. Give study plan, key concepts, sample tasks.`:lang==='kz'?`Сіз қазақстандық SOR/SOCh эксперті болып табыласыз. Тақырыпқа дайындалуға көмектесіңіз: ${text}. Жоспар, негізгі ұғымдар және үлгі тапсырмалар беріңіз.`:`Ты эксперт по СОР/СОЧ. Помоги подготовиться к теме: ${text}. Дай план, ключевые концепции и примеры.`;
  if(aiMode==='search')sys=lang==='en'?'You are an intelligent research assistant. For the given query, provide a comprehensive answer with multiple perspectives, key facts, and practical insights. Structure your response clearly with sections if needed.':lang==='kz'?'Сіз ақылды зерттеу көмекшісісіз. Берілген сұраққа жан-жақты жауап беріңіз: негізгі фактілер, практикалық түсініктемелер. Жауапты нақты құрылыммен беріңіз.':'Ты интеллектуальный поисковый ассистент. На запрос дай исчерпывающий ответ с ключевыми фактами, разными перспективами и практическими выводами. Структурируй ответ чётко.';
  const hist=aiMsgs.slice(-8).map(m=>`${m.r==='u'?'User':'AI'}: ${m.c}`).join('\n');
  const resp=await callGemini(hist+'\nUser: '+text,sys);
  document.getElementById('aiLoader')?.remove();
  aiMsgs.push({r:'a',c:resp,t:new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})});
  localStorage.setItem(`aiH_${CU.id}`,JSON.stringify(aiMsgs.slice(-60)));
  renderAIMsgs();
}

        <div class="form-group"><label class="form-label">${t('cvv')}</label><input class="card-input" id="ccCVV" maxlength="3" placeholder="•••" type="password"></div>
      </div>
      <div class="form-group"><label class="form-label">${t('holder')}</label><input class="card-input" id="ccHolderI" placeholder="IVAN IVANOV" oninput="document.getElementById('ccHolder').textContent=this.value.toUpperCase()||'CARDHOLDER'" style="text-transform:uppercase;"></div>

        <span style="font-weight:800;font-size:16px;color:var(--coin);">${price} ₸</span>
      </div>
    </div>
    <div class="modal-ft"><button class="btn btn-ghost" onclick="closeModal()">${t('cancel')}</button><button class="btn btn-primary" onclick="processPayment(${coins},'${label}')">${t('pay')} ${price} ₸</button></div>`);
}
function fmtCard(el){
  let v=el.value.replace(/\D/g,'').substring(0,16);
  el.value=v.replace(/(.{4})/g,'$1 ').trim();
  document.getElementById('ccDisp').textContent=(el.value||'').replace(/\d(?=.{4})/g,'•')||'•••• •••• •••• ••••';
}
function processPayment(coins,label){
  const num=document.getElementById('ccNum').value.replace(/\s/g,'');
  const exp=document.getElementById('ccExpI').value;
  const cvv=document.getElementById('ccCVV').value;
  if(num.length!==16||!exp||cvv.length!==3){toast(lang==='en'?'Fill all card fields':lang==='kz'?'Барлық карта өрістерін толтырыңыз':'Заполните все поля карты','e');return;}
  toast(lang==='en'?'Processing...':lang==='kz'?'Өңделуде...':'Обрабатываем...','i');
  setTimeout(()=>{
    CU.coins=(CU.coins||0)+coins;saveCU();updateBadges();
    toast(`+C${coins} (${label})!`,'s',5000);
  },1500);
  closeModal();
}
function buyPro(){
  if((CU.coins||0)<1500){toast(lang==='en'?'Not enough coins (need 1500)':lang==='kz'?'Монета жеткіліксіз (1500 керек)':'Недостаточно монет (нужно 1500)','e');return;}
  CU.coins-=1500;CU.isPro=true;saveCU();updateBadges();
  toast(lang==='en'?'PRO activated! Unlimited AI unlocked':lang==='kz'?'PRO белсенді! Шексіз ИИ':'PRO активирован! Безлимитный ИИ','s',5000);
  renderStore();
}

function getConvs(){
  const all=S.msgs.filter(m=>m.from===CU.id||m.to===CU.id);
  const map={};
  all.forEach(m=>{const o=m.from===CU.id?m.to:m.from;if(!map[o]||m.ts>map[o].ts)map[o]={other:o,last:m.c,ts:m.ts};});
  return Object.values(map).sort((a,b)=>b.ts-a.ts);
}
function openDMModal(uid){navigate('messages');setTimeout(()=>openDMChat(uid),100);}
function openDMChat(uid){
  activeDM=uid;

  S.msgs.filter(m=>m.from===uid&&m.to===CU.id).forEach(m=>m.read=true);save();updateBadges();
  const msgs=S.msgs.filter(m=>(m.from===CU.id&&m.to===uid)||(m.from===uid&&m.to===CU.id)).sort((a,b)=>a.ts-b.ts);

  /х[уy][йj]/i,/[хx][уy][йj]/i,/пзд/i,

  /\bсдохни\b/i,/\bиди умри\b/i,/\bубью\b/i,/\bзадушу\b/i,
  /\bзаткнись\b/i,/\bзашкварный\b/i,/\bзашквар\b/i,
  // toxic slang
  /\bпо приколу\b/i,/\bлол\b/i,/\blol\b/i,/\bкринж\b/i,/\bcring[ei]\b/i,
  /\bнуб\b/i,/\bnub\b/i,/\bноуб\b/i,/\bнооб\b/i,
  // hate
  /\bниггер\b/i,/\bнигга\b/i,/\bnigger\b/i,/\bnigga\b/i,
];

const WARN_PATTERNS = [
  // borderline — gets AI soft-warning only, not hard block
  /\bблин\b/i,/\bчёрт\b/i,/\bёлки\b/i,/\bкапец\b/i,/\bзараза\b/i,
];

/* check if text contains profanity — returns {blocked, soft, matched} */
function moderateText(text){
  if(!text)return{blocked:false,soft:false};
  const clean=text.toLowerCase();
  for(const re of BAD_PATTERNS){if(re.test(clean))return{blocked:true,soft:false,matched:re.source};}
  for(const re of WARN_PATTERNS){if(re.test(clean))return{blocked:false,soft:true,matched:re.source};}
  return{blocked:false,soft:false};
}

/* Check if user is muted/banned right now */
function getModeStatus(uid){
  const u=S.users.find(u=>u.id===uid);if(!u)return{ok:true};
  const now=Date.now();
  if(u.bannedUntil==='permanent')return{ok:false,type:'ban',msg:lang==='en'?'Your account is permanently banned.':lang==='kz'?'Сіздің аккаунтыңыз тұрақты бұғатталған.':'Ваш аккаунт перманентно заблокирован.'};
  if(u.bannedUntil&&u.bannedUntil>now){
    const h=Math.ceil((u.bannedUntil-now)/3600000);
    return{ok:false,type:'ban',msg:(lang==='en'?`Banned for ${h}h more`:lang==='kz'?`${h}с бұғатталғансыз`:`Заблокированы ещё на ${h}ч`)};
  }
  if(u.mutedUntil&&u.mutedUntil>now){
    const h=Math.ceil((u.mutedUntil-now)/3600000);
    return{ok:false,type:'mute',msg:(lang==='en'?`Muted for ${h}h more (inappropriate language)`:lang==='kz'?`${h}с мутталдыңыз`:` Мут ещё на ${h}ч (нарушение правил)`)};
  }
  return{ok:true};
}

/* Apply violation: track violation count → escalate penalty */
function applyViolation(uid, reason, severity='mute'){
  const u=S.users.find(u=>u.id===uid);if(!u)return;
  if(!u.violations)u.violations=0;
  u.violations++;
  const now=Date.now();
  let action='',dur=0;
  if(u.violations===1){
    // First: random mute 24-72h
    dur=Math.floor(24+Math.random()*48)*3600000;
    u.mutedUntil=now+dur;
    action=`mute_${Math.round(dur/3600000)}h`;
  } else if(u.violations===2){
    // Second: ban 7 days
    dur=7*24*3600000;
    u.bannedUntil=now+dur;
    action='ban_7d';
  } else {
    // Third+: permanent ban
    u.bannedUntil='permanent';
    action='ban_permanent';
    // Notify admins via Telegram
    sendTelegramAlert(`[AqboHub] PERMANENT BAN\nUser: ${u.name} (${u.email})\nViolations: ${u.violations}\nLast reason: ${reason}`);
  }
  S.modLog.push({id:'ml'+Date.now(),uid,reason,action,ts:now});
  S.users=S.users.map(x=>x.id===uid?u:x);
  if(uid===CU?.id){CU=u;saveCU();}
  else save();
  saveMod();
  addNotif(uid,`[${lang==='en'?'Moderation':lang==='kz'?'Модерация':'Модерация'}] ${action.includes('permanent')?
    (lang==='en'?'Permanent ban':lang==='kz'?'Тұрақты бан':'Перманентный бан'):
    action.includes('ban')?(lang==='en'?'Banned 7 days':lang==='kz'?'7 күн бан':'Бан 7 дней'):
    (lang==='en'?'Muted':lang==='kz'?'Мутталдыңыз':'Мут')}. ${lang==='en'?'Reason':lang==='kz'?'Себеп':'Причина'}: ${reason}`,'warn');
}

/* Report a user / content — sends to TG and stores */
async function reportContent(targetUid, contentText, contentType, contentId){
  const now=Date.now();
  const target=S.users.find(u=>u.id===targetUid);

  // Store report
  S.reports.push({id:'rp'+now,by:CU.id,targetUid,contentText:contentText?.substring(0,200),contentType,contentId,ts:now,status:'open'});
  saveMod();

  // Count reports on this user in last 24h
  const recentReports=S.reports.filter(r=>r.targetUid===targetUid&&r.ts>now-86400000).length;
  if(recentReports>=3){
    // Auto penalize
    if(target){
      target.rating=Math.max(0,parseFloat(((target.rating||0)-0.5).toFixed(1)));
      if(!target.mutedUntil||target.mutedUntil<now){
        target.mutedUntil=now+3*3600000; // 3h auto-mute
      }
      S.users=S.users.map(u=>u.id===targetUid?target:u);
      if(targetUid===CU?.id){CU=target;saveCU();}
      else save();
      addNotif(targetUid,lang==='en'?'-0.5 rating: multiple complaints received':lang==='kz'?'-0.5 рейтинг: бірнеше шағым келіп түсті':'-0.5 к рейтингу: получено 3+ жалобы','warn');
    }
  }

  // Send to Telegram (anonymized)
  const tgMsg=`<b>[AqboHub Report]</b>
Type: ${contentType}
Target: ${target?.name||'Unknown'} (${target?.email||'?'})
Reporter: (anonymous)
Content: <code>${(contentText||'').substring(0,150)}</code>
Reports today: ${recentReports}
Time: ${new Date(now).toLocaleString('ru')}

/mute_${targetUid} /ban_${targetUid} /unban_${targetUid}`;
  await sendTelegramAlert(tgMsg);

  toast(lang==='en'?'Report sent. Thank you.':lang==='kz'?'Шағым жіберілді. Рахмет.':'Жалоба отправлена. Спасибо.','s');
}

/* The main gate — call before posting ANY content */
function contentGate(text){
  // Check status
  const status=getModeStatus(CU.id);
  if(!status.ok){toast(status.msg,'e',6000);return false;}

  // Profanity
  const m=moderateText(text);
  if(m.blocked){
    applyViolation(CU.id,`Profanity detected`,'mute');
    const vCount=(S.users.find(u=>u.id===CU.id)?.violations)||1;
    const msg=vCount===1?
      (lang==='en'?'Message blocked. Inappropriate language. Muted 24-72h.':lang==='kz'?'Хабарлама бұғатталды. Сіз муттелдіңіз 24-72 сағатқа.':'Сообщение заблокировано. Нецензурная лексика. Мут 24-72ч.'):
      vCount===2?
      (lang==='en'?'Second violation. Banned 7 days.':lang==='kz'?'Екінші бұзушылық. 7 күн бан.':'Второе нарушение. Бан 7 дней.'):
      (lang==='en'?'Permanent ban applied.':lang==='kz'?'Тұрақты бан.':'Перманентный бан.');
    toast(msg,'e',8000);
    // Send to TG
    sendTelegramAlert(`[AqboHub] Profanity blocked\nUser: ${CU.name} (${CU.email})\nText: ${text.substring(0,100)}\nViolation #${vCount}`);
    return false;
  }

  // Soft warning
  if(m.soft){
    toast(lang==='en'?"Hey, let's keep it respectful here — we're all from the same lyceum!":
      lang==='kz'?'Барлығымыз бір лицейдегіміз, сыпайы сөйлесейік!':
      'Эй, давай без грубостей — мы все из одного лицея!','w',5000);
    // still allow but log
    S.modLog.push({id:'ml'+Date.now(),uid:CU.id,reason:'soft_warn',action:'warned',ts:Date.now()});
    saveMod();
  }

  // Rating gate for chat (must be >=3.0 or 7 days on platform)
  const u=S.users.find(u=>u.id===CU.id);
  const daysSince=(Date.now()-(u?.createdAt||Date.now()))/86400000;
  if((u?.rating||0)<3.0&&daysSince<7){
    toast(lang==='en'?'Chat available at rating 3.0+ or after 7 days on platform. Ask questions via AI or DM a tutor.':
      lang==='kz'?'Чат 3.0+ рейтингте немесе 7 күннен кейін қол жетімді.':
      'Чат доступен при рейтинге 3.0+ или после 7 дней на платформе. Пока используйте ИИ или личку тьюторам.','w',6000);
    return false;
  }

  return true;
}

/* AI Etiquette nudge — called if soft pattern detected in AI chat context */

/* Daily activity bonus (20 coins) — runs on login/app open */
function checkDailyBonus(){
  const today=new Date().toDateString();
  const key=`daily_${CU.id}`;
  if(S.dailyActive[key]===today)return; // already given today
  // Was user active yesterday? (task done, module created, msg sent)
  const yesterday=Date.now()-86400000;
  const wasActive=
    S.tasks.some(t=>t.tutorId===CU.id&&t.completedAt&&new Date(t.completedAt)>new Date(yesterday))||
    S.modules.some(m=>m.authorId===CU.id&&m.createdAt>yesterday)||
    S.msgs.some(m=>m.from===CU.id&&m.ts>yesterday)||
    S.reviews.some(r=>r.from===CU.id&&r.ts>yesterday);
  // For first day users always give bonus
  const isNew=(Date.now()-(CU.createdAt||Date.now()))/86400000<1;
  if(wasActive||isNew){
    CU.coins=(CU.coins||0)+20;
    saveCU();updateBadges();
    S.dailyActive[key]=today;saveMod();
    toast(lang==='en'?'+20 daily activity bonus!':lang==='kz'?'+20 күнделікті белсенділік бонусы!':'+20 монет — ежедневный бонус за активность!','s',4000);
  }
}

  S.users=S.users.map(x=>x.id===uid?u:x);
  if(rpId)closeReport(rpId,false);
  save();
  addNotif(uid,lang==='en'?'You have been muted for 24h by administrator.':lang==='kz'?'Сіз 24 сағатқа мутталдыңыз.':'Вы замьючены на 24ч администратором.','warn');
  sendTelegramAlert(`[AqboHub] Admin muted: ${u.name} (${u.email}) for 24h`);
  toast(lang==='en'?'Muted':lang==='kz'?'Мутталды':'Замьючен','s');openAdminPanel();
}
function adminBan(uid,rpId){
